name: publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 5.0.0)'
        required: true

env:
  LIBRARY_PROJECTS: >-
    src/HouseofCat.Utilities/HouseofCat.Utilities.csproj
    src/HouseofCat.Hashing/HouseofCat.Hashing.csproj
    src/HouseofCat.Encryption/HouseofCat.Encryption.csproj
    src/HouseofCat.Compression/HouseofCat.Compression.csproj
    src/HouseofCat.Serialization/HouseofCat.Serialization.csproj
    src/HouseofCat.Dataflows/HouseofCat.Dataflows.csproj
    src/HouseofCat.RabbitMQ/HouseofCat.RabbitMQ.csproj
    src/HouseofCat.Data/HouseofCat.Data.csproj

jobs:
  publish:
    name: Build & Publish NuGet
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Extract version
      id: version
      shell: bash
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
        else
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      shell: bash
      run: |
        for proj in ${{ env.LIBRARY_PROJECTS }}; do
          dotnet restore "$proj"
        done

    - name: Build
      shell: bash
      run: |
        for proj in ${{ env.LIBRARY_PROJECTS }}; do
          dotnet build "$proj" --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}
        done

    - name: Pack
      shell: bash
      run: |
        for proj in ${{ env.LIBRARY_PROJECTS }}; do
          dotnet pack "$proj" --configuration Release --no-build --output ./nupkgs -p:Version=${{ steps.version.outputs.version }}
        done

    - name: Push to NuGet
      shell: bash
      run: |
        for pkg in ./nupkgs/*.nupkg; do
          dotnet nuget push "$pkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        done

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: ./nupkgs/*.nupkg
