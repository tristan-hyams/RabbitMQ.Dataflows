name: publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    name: Build & Publish NuGet
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Extract version from tag
      id: version
      shell: bash
      run: |
        TAG="${GITHUB_REF#refs/tags/v}"
        echo "version=$TAG" >> "$GITHUB_OUTPUT"

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore RabbitMQ.Dataflows.sln

    - name: Build
      run: dotnet build RabbitMQ.Dataflows.sln --configuration Release --no-restore /p:Version=${{ steps.version.outputs.version }}

    - name: Pack
      run: dotnet pack RabbitMQ.Dataflows.sln --configuration Release --no-build --output ./nupkgs /p:Version=${{ steps.version.outputs.version }}

    - name: Push to NuGet
      run: dotnet nuget push "./nupkgs/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: ./nupkgs/*.nupkg
